server {
    listen 808;
    listen 909 ssl;
    http2 on;
    server_name uploads.media.example.com;
    root /opt/emom/mediaserver/deploy/upload-ui;
    auth_basic "EMOM Upload Console";
    auth_basic_user_file /etc/nginx/.htpasswd_uploads;

    # TLS cert configuration intentionally omitted here; add your cert paths.
    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Multi-GB uploads can run for hours.
    client_max_body_size 0;
    client_body_timeout 12h;
    send_timeout 12h;
    keepalive_timeout 75s;

    # Optional: tighten origin to your frontend host.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, HEAD, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Upload-Length, Upload-Offset, Tus-Resumable, Upload-Metadata, Upload-Defer-Length, Upload-Checksum" always;
    add_header Access-Control-Expose-Headers "Location, Upload-Offset, Upload-Length, Tus-Resumable, Tus-Version, Tus-Extension, Tus-Max-Size" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /files/ {
        proxy_pass http://127.0.0.1:1080/files/;
        proxy_http_version 1.1;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_read_timeout 12h;
        proxy_send_timeout 12h;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Connection "";
    }

    location /notify/ {
        proxy_pass http://127.0.0.1:9100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /upload.css {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=600";
    }

    location = /upload.js {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=60";
    }

    location / {
        try_files $uri /index.html;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:1080/healthz;
    }
}
